  - id: java-ocp-009
    type: vocab
    term_pt: "Correspondência de padrões"
    term_en: "Pattern matching"
    definition: "Language feature that combines type testing and extraction in one step — instanceof (Java 16) and switch (Java 21) with record destructuring."
    usage: "With pattern matching, I can destructure a record directly in the switch case."
    tags: [java, ocp, vocabulario]

  - id: java-ocp-010
    type: vocab
    term_pt: "Coleções sequenciadas"
    term_en: "Sequenced collections"
    definition: "Java 21 interfaces (SequencedCollection/Map) adding getFirst(), getLast(), reversed() to ordered collections like List and LinkedHashMap."
    usage: "With sequenced collections, I can call getFirst() on any List instead of get(0)."
    tags: [java, ocp, vocabulario, java21]

  - id: java-ocp-011
    type: scenario
    situation: "Você autoboxa null de um Map.get() em um int primitivo."
    question: "O que acontece?"
    answer: "NullPointerException. Map.get() retorna Integer (null se ausente). Autoboxing chama intValue() no null. Use getOrDefault() ou verifique null antes de unboxar."
    tags: [java, ocp, entrevista]

  - id: java-ocp-012
    type: scenario
    situation: "Você quer usar ServiceLoader para carregar implementações de uma interface em JPMS."
    question: "O que precisa declarar no module-info.java?"
    answer: "O módulo provider declara 'provides Interface with Impl'. O módulo consumer declara 'uses Interface'. O pacote da impl não precisa ser exported — ServiceLoader acessa via reflexão controlada."
    tags: [java, ocp, modulos, entrevista]

  - id: java-ocp-013
    type: pitfall
    trap: "Usar == para comparar strings vindas de new String()"
    why: "new String(\"abc\") cria objeto fora do pool. \"abc\" == new String(\"abc\") é false mesmo com conteúdo igual."
    prevention: "Sempre use .equals() para strings. String pool só funciona para literals e .intern()."
    tags: [java, ocp, armadilhas]

  - id: java-ocp-014
    type: pitfall
    trap: "Esperar que sealed class switch sem default dê erro de compilação ao adicionar subclasse"
    why: "Funciona com switch expressions (que exigem exhaustiveness). Switch statements tradicionais não exigem, e silenciosamente ignoram o novo caso."
    prevention: "Use switch expressions (com retorno) para garantir exhaustive matching com sealed classes."
    tags: [java, ocp, armadilhas, sealed]

  - id: java-ocp-015
    type: pitfall
    trap: "Colocar return dentro de finally para tratar erro"
    why: "finally com return mascara qualquer exceção lançada no try ou catch — a exceção desaparece silenciosamente."
    prevention: "Nunca use return em finally. Use catch para tratar exceções e finally apenas para cleanup."
    tags: [java, ocp, armadilhas, excecoes]
