cards:
  - id: java-ocp-001
    type: basic
    front: "Qual o formato do exame OCP Java SE 21 (1Z0-830)?"
    back: |
      50 questões, 90 minutos, ~68% para aprovação. Cobre
      módulos, records, sealed classes, pattern matching,
      virtual threads e sequenced collections.
    tags: [java, ocp, certificacao]

  - id: java-ocp-002
    type: basic
    front: "Por que Integer a = 127; Integer b = 127; (a == b) é true, mas com 128 é false?"
    back: |
      Java cacheia Integer de -128 a 127 (IntegerCache). Dentro
      desse range, autoboxing retorna a mesma referência. Fora
      do range, cria objetos distintos, e == compara referências.
    tags: [java, ocp, autoboxing]

  - id: java-ocp-003
    type: basic
    front: "Quais são as limitações da keyword var em Java?"
    back: |
      Não pode ser usada com: null (tipo não inferível),
      lambdas sem contexto, retorno de método, campos de classe,
      parâmetros de método. Só funciona para variáveis locais
      com inicialização imediata.
    tags: [java, ocp, var]

  - id: java-ocp-004
    type: basic
    front: "Em try-finally com return em ambos, qual return vence?"
    back: |
      O return do finally sempre vence. Se try retorna 1 e
      finally retorna 2, o método retorna 2. O valor do try
      é descartado. Isso também engole exceções do try.
    tags: [java, ocp, excecoes]

  - id: java-ocp-005
    type: basic
    front: "Qual a diferença entre method hiding e method overriding?"
    back: |
      Override (instância): resolvido em runtime via polimorfismo.
      Hiding (static): resolvido em compile-time pelo tipo da
      referência. Parent p = new Child(); p.staticMethod()
      chama o do Parent, não do Child.
    tags: [java, ocp, heranca]

