  - id: java-fundaments-009
    type: vocab
    term_pt: "Autoboxing"
    term_en: "Autoboxing"
    definition: "Automatic conversion between primitive types (int) and their wrapper classes (Integer) done by the compiler."
    usage: "Be careful with autoboxing in tight loops — it creates unnecessary Integer objects and kills performance."
    tags: [java, vocabulario, primitivos]

  - id: java-fundaments-010
    type: vocab
    term_pt: "Classes seladas"
    term_en: "Sealed classes"
    definition: "Java 17+ feature that restricts which classes can extend a class/interface, enabling exhaustive pattern matching in switch."
    usage: "I used sealed classes so the compiler enforces exhaustive switch coverage."
    tags: [java, vocabulario, java17]

  - id: java-fundaments-011
    type: scenario
    situation: "Você precisa criar DTOs imutáveis com equals/hashCode/toString em Java 16+."
    question: "Qual feature usar?"
    answer: "Records — declaram campos no header, geram automaticamente construtor canônico, accessors, equals, hashCode e toString. Compact constructor permite validação sem repetir parâmetros."
    tags: [java, records, entrevista]

  - id: java-fundaments-012
    type: scenario
    situation: "Você está usando parallelStream() para processar I/O em uma aplicação web."
    question: "Qual o problema?"
    answer: "parallelStream usa o ForkJoinPool.commonPool() compartilhado pela JVM inteira. I/O bloqueante esgota as threads e trava outras operações paralelas. Use ExecutorService dedicado ou virtual threads."
    tags: [java, streams, entrevista]

  - id: java-fundaments-013
    type: pitfall
    trap: "Comparar wrappers com == em vez de .equals()"
    why: "Integer cache cobre apenas -128 a 127. Fora disso, == compara referências: new Integer(200) == new Integer(200) é false."
    prevention: "Sempre use .equals() para comparar wrappers, ou faça unboxing explícito."
    tags: [java, armadilhas, autoboxing]

  - id: java-fundaments-014
    type: pitfall
    trap: "Autoboxing null em primitivo dentro de loop"
    why: "Integer x = null; int y = x; lança NullPointerException. Autoboxing chama .intValue() no null."
    prevention: "Verifique null antes de unboxing ou use OptionalInt para valores opcionais."
    tags: [java, armadilhas, autoboxing]

  - id: java-fundaments-015
    type: pitfall
    trap: "Usar Comparable genérico sem tipar (raw type)"
    why: "class Foo implements Comparable (sem <Foo>) compila mas compareTo recebe Object, exigindo cast e perdendo type safety."
    prevention: "Sempre tipar: implements Comparable<Foo> para compareTo(Foo other) tipado."
    tags: [java, armadilhas, comparable]
