cards:
  - id: java-fundaments-001
    type: basic
    front: "Quais são as principais áreas de memória da JVM?"
    back: |
      Heap (Young Gen + Old Gen), Metaspace (metadados de classes,
      substituiu PermGen), Stack (uma por thread, frames de métodos),
      e Program Counter Register (instrução atual por thread).
    tags: [java, jvm, memoria]

  - id: java-fundaments-002
    type: basic
    front: "Qual a diferença entre G1 e ZGC como garbage collectors?"
    back: |
      G1 é o default desde Java 9 — divide heap em regiões, pausas
      ~200ms. ZGC garante pausas <1ms independente do heap size,
      ideal para aplicações de baixa latência com heaps grandes.
    tags: [java, jvm, gc]

  - id: java-fundaments-003
    type: basic
    front: "O que é JIT compilation e quais os compiladores C1 e C2?"
    back: |
      JIT compila bytecode para código nativo em runtime. C1
      compila rápido com otimizações leves (client). C2 faz
      otimizações agressivas (inlining, escape analysis).
      Tiered compilation usa ambos progressivamente.
    tags: [java, jvm, jit]

  - id: java-fundaments-004
    type: basic
    front: "Como funciona o classloader hierarchy em Java?"
    back: |
      Usa parent delegation: Bootstrap → Platform → Application.
      Cada classloader delega ao pai antes de tentar carregar.
      Isso garante que classes core (java.lang) não sejam
      sobrescritas por classes do usuário.
    tags: [java, jvm, classloader]

  - id: java-fundaments-005
    type: basic
    front: "Qual a diferença entre ArrayList e LinkedList em termos de performance?"
    back: |
      ArrayList: O(1) acesso por índice, O(n) inserção no meio,
      cache-friendly. LinkedList: O(n) acesso, O(1) inserção/remoção
      se já tem o nó. Na prática, ArrayList vence quase sempre
      pela localidade de cache.
    tags: [java, collections]

