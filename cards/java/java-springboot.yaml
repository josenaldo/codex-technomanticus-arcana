cards:
  - id: java-springboot-001
    type: basic
    front: "Qual a diferença entre BeanFactory e ApplicationContext?"
    back: |
      BeanFactory é o container básico (lazy loading). ApplicationContext
      estende com: eager loading, eventos, i18n, AOP automático,
      e integração com Spring MVC. Na prática, sempre use
      ApplicationContext.
    tags: [java, spring, ioc]

  - id: java-springboot-002
    type: basic
    front: "Por que constructor injection é preferível a field @Autowired?"
    back: |
      Constructor injection: dependências explícitas, imutáveis (final),
      fácil de testar (sem reflexão), falha rápido se falta bean.
      Field injection esconde dependências, dificulta testes e
      permite estado parcialmente inicializado.
    tags: [java, spring, di]

  - id: java-springboot-003
    type: basic
    front: "Quais os bean scopes em Spring e o principal pitfall de prototype?"
    back: |
      Scopes: singleton (default), prototype, request, session,
      application. Pitfall: prototype injetado em singleton é
      criado UMA vez. Use ObjectProvider<T> ou @Lookup para
      obter nova instância a cada uso.
    tags: [java, spring, beans]

  - id: java-springboot-004
    type: basic
    front: "Qual a diferença entre @Component, @Service, @Repository e @Controller?"
    back: |
      Todos são @Component (escaneados). Diferença semântica:
      @Service = lógica de negócio, @Repository = acesso a dados
      (adiciona tradução de exceções SQL→DataAccessException),
      @Controller = endpoint web (habilita @RequestMapping).
    tags: [java, spring, estereotipos]

  - id: java-springboot-005
    type: basic
    front: "Quais os tipos de proxy AOP no Spring e quando cada é usado?"
    back: |
      JDK Dynamic Proxy: classe implementa interface (proxy
      implementa mesma interface). CGLIB: classe sem interface
      (gera subclasse via bytecode). Spring Boot usa CGLIB por
      default desde 2.0 (proxyTargetClass=true).
    tags: [java, spring, aop]

