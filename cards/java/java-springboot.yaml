  - id: java-springboot-009
    type: vocab
    term_pt: "Inversão de controle"
    term_en: "Inversion of Control (IoC)"
    definition: "Design principle where the framework controls object creation and lifecycle instead of the application code, enabling loose coupling via dependency injection."
    usage: "Spring's IoC container manages bean creation, so we just declare dependencies."
    tags: [java, spring, vocabulario]

  - id: java-springboot-010
    type: vocab
    term_pt: "Propagação transacional"
    term_en: "Transaction propagation"
    definition: "Policy defining how a transactional method behaves when called within an existing transaction — REQUIRED joins it, REQUIRES_NEW suspends it and creates a new one."
    usage: "I set propagation to REQUIRES_NEW so the audit log commits even if the outer transaction rolls back."
    tags: [java, spring, vocabulario, transactional]

  - id: java-springboot-011
    type: scenario
    situation: "Um método @Transactional chama outro método @Transactional da mesma classe."
    question: "A segunda transação é aplicada?"
    answer: "Não. Spring AOP usa proxies — chamadas internas (this.method()) bypassa o proxy. A anotação é ignorada. Solução: injetar o próprio bean ou extrair para outra classe."
    tags: [java, spring, entrevista]

  - id: java-springboot-012
    type: scenario
    situation: "Você precisa expor configurações tipadas com validação no Spring Boot."
    question: "Qual abordagem usar?"
    answer: "Use @ConfigurationProperties(prefix) com um record ou classe com @Validated e anotações Bean Validation (@NotBlank, @Min). Habilite com @EnableConfigurationProperties. Mais seguro que @Value."
    tags: [java, spring, entrevista]

  - id: java-springboot-013
    type: pitfall
    trap: "Bean prototype injetado em singleton mantém sempre a mesma instância"
    why: "O singleton é criado uma vez, e o prototype é injetado nesse momento. Não há re-injeção automática em cada uso."
    prevention: "Use ObjectProvider<T>, Provider<T> (JSR-330) ou @Lookup para obter instância nova a cada chamada."
    tags: [java, spring, armadilhas]

  - id: java-springboot-014
    type: pitfall
    trap: "Esperar que @Transactional funcione em métodos private"
    why: "Proxies AOP (JDK e CGLIB) não interceptam métodos private. A anotação é silenciosamente ignorada."
    prevention: "Marque apenas métodos public (ou protected para CGLIB). Valide com logs de transação em dev."
    tags: [java, spring, armadilhas, transactional]

  - id: java-springboot-015
    type: pitfall
    trap: "Usar @Transactional(readOnly=true) achando que impede escritas"
    why: "readOnly é uma dica para o provider. Hibernate otimiza (sem dirty checking), mas NÃO impede INSERT/UPDATE — o banco aceita normalmente."
    prevention: "Use readOnly para otimização de leitura, não como controle de segurança. Controle escrita via roles/permissões."
    tags: [java, spring, armadilhas, transactional]
