  - id: infra-linux-001
    type: basic
    front: "Para garantir que ícones e glifos especiais renderizem corretamente no Windows Terminal (ex: Powerlevel10k), qual tipo de fonte deve ser instalada?"
    back: "Fontes do tipo Nerd Fonts, como a Fira Code Nerd Font."
    tags: [terminal, wsl, fontes]

  - id: infra-linux-002
    type: basic
    front: "O que deve ser feito se a internet do Linux dentro do WSL estiver muito lenta (downloads e pacotes)?"
    back: "Nas propriedades do adaptador de rede `vEthernet (WSL)` no Painel de Controle do Windows, desabilitar 'Large Send Offload Version 2 (IPv4)' e (IPv6)."
    tags: [wsl, rede, troubleshooting]

  - id: infra-linux-003
    type: cloze
    text: "Para adicionar um tema customizado no Windows Terminal, você edita o arquivo {{c1::settings.json}} e adiciona o código JSON do esquema na lista de {{c2::schemes}}."
    tags: [terminal, wsl, windows]

  - id: infra-linux-004
    type: cloze
    text: "Ao invés de baixar pacotes e instalar linguagens via apt no WSL para JS, usa-se o {{c1::NVM}} para Node, e para o Go atualiza-se o path com o binário em {{c2::/usr/local/go/bin}}."
    tags: [wsl, setup, linguagens]

